# Docker Compose 配置 - 学生成绩管理系统
# 生产环境配置

version: '3.8'

services:
  # ============================================
  # 后端服务 - FastAPI
  # ============================================
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: student-grade-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/grades.db
      - APP_NAME=${APP_NAME:-学生成绩管理系统}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ============================================
  # 前端服务 - Vue 3 + Nginx
  # ============================================
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deployment/frontend/Dockerfile
    container_name: student-grade-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

# ============================================
# 网络配置
# ============================================
networks:
  app-network:
    driver: bridge
    name: student-grade-network

# ============================================
# 数据卷配置
# ============================================
volumes:
  backend-data:
    name: student-grade-data
    driver: local
